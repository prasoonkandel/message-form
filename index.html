<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Magic of CSS</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap"
rel="stylesheet"
/>
<style>
body {
font-family: "Nunito", sans-serif;
background-color: #8c8c8c;
color: #000000;
height: 100vh;
margin: 0;
}
.page-1 {
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
}
.message-box {
background-color: #fff;
padding: 2rem;
border-radius: 8px;
width: 300px;
}
.message-box h2 {
text-align: center;
margin-bottom: 1.5rem;
}
.form-group {
margin-bottom: 1rem;
}
.input-group label {
margin-bottom: 0.5rem;
color: #323232;
padding-left: 2px;
padding-right: 2px;
font-size: 16px;
position: absolute;
display: inline;
top: 12px;
left: 15px;
background-color: #fff;
transition: 0.1s ease-in-out;
}
.input-group p {
font-size: 16px;
margin-bottom: 10px;
transition: 0.1s ease-in-out;
}
.input-group {
margin-bottom: 1.4rem;
position: relative;
transition: 0.2s ease all;
}
.radio-group {
margin-bottom: 1.4rem;
position: relative;
display: flex;
justify-content: space-around;
transition: 0.2s ease all;
}
.input-group textarea {
min-height: 15%;
resize: vertical;
}
.input-group input,
.input-group textarea,
.input-group select {
width: 100%;
color: #000000;
font-size: 16px;
padding: 0.75rem;
border: none;
border: 1px solid #0f0f0f;
border-radius: 4px;
box-sizing: border-box;
background-color: #fff;
transition: 0.2s ease all;
}
.input-group input:focus,
.input-group input:valid,
.input-group input.has-text,
.input-group textarea:focus,
.input-group textarea:valid {
color: #000000;
border: 2px solid #004c98;
outline: none;
}
.input-group input:focus ~ label,
.input-group input:valid ~ label,
.input-group input.has-text ~ label,
.input-group textarea:focus ~ label,
.input-group textarea:valid ~ label {
color: #004c98;
font-size: 14px;
transform: translate(-3px, -20px);
}
.btn {
width: 100%;
padding: 15px;
background-color: #007bff;
color: white;
border: none;
border-radius: 4px;
cursor: pointer;
font-size: 1.2rem;
}
.btn:hover {
background-color: #0056b3;
}
</style>
</head>
<body>
<div class="page-1">
<div class="message-box">
<h2>Message Me</h2>
<form>
<div class="input-group">
<input type="text" id="name" name="name" required autofill="off" />
<label for="name">Name</label>
</div>
<div class="input-group">
<input type="email" id="email" name="email" required />
<label for="email">Email</label>
</div>
<div class="input-group">
<textarea
type="textarea"
id="message"
name="message"
required
></textarea>
<label for="message">Message</label>
</div>
<div class="input-group">
<p>Country</p>
<select id="country">
<option value="india">India</option>
<option value="china">China</option>
<option value="japan">Japan</option>
<option value="korea">Korea</option>
<option value="australia">Australia</option>
<option value="pakistan">Pakistan</option>
</select>
</div>
<div class="radio-group">
<div>
<input type="radio" value="m" name="gender" id="gender" />
<label for="gender">Male</label>
</div>
<div>
<input type="radio" value="m" name="gender" id="gender" />
<label for="gender">Female</label>
</div>
<div>
<input type="radio" value="o" name="gender" id="gender" />
<label for="gender">Others</label>
</div>
</div>
<button type="submit" class="btn">Send Message</button>
</form>
</div>
</div>
<script>
document.querySelectorAll("input").forEach((input) => {
input.addEventListener("input", () => {
this.classList.toggle("has-text", this.value.trim() !== "");
});
});
</script>
</body>
</html>
